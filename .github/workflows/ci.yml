# .github/workflows/ci.yml
#
# Pipeline de Integração Contínua (CI).
# Corre automaticamente em cada push e pull request para main e develop.
#
# Objectivo: garantir que nenhum código com erros entra na base de código.
#
# Jobs e ordem de execução:
#
#   lint ──┐
#          ├── build (só corre se lint E test passarem)
#   test ──┘
#
# lint e test correm em paralelo para minimizar o tempo total.
# build só corre se ambos passarem (usa "needs").

name: CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

env:
  NODE_VERSION: "24"

# O código da aplicação vive em backend/ — todos os comandos npm correm aí.
defaults:
  run:
    working-directory: backend

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npm run type-check

  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_USER: analytics_user
          POSTGRES_PASSWORD: analytics_password
          POSTGRES_DB: analytics_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U analytics_user -d analytics_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Variáveis alinhadas com backend/src/infra/frameworks/config.ts
      - name: Create test .env file
        run: |
          cat > .env << EOF
          NODE_ENV=test
          PORT=3001
          LOG_LEVEL=error
          CORS_ORIGIN=http://localhost:3000
          DATABASE_HOST=localhost
          DATABASE_PORT=5432
          DATABASE_USER=analytics_user
          DATABASE_PASSWORD=analytics_password
          DATABASE_NAME=analytics_test
          REDIS_HOST=localhost
          REDIS_PORT=6379
          REDIS_DB=0
          JWT_SECRET=test-jwt-secret-not-for-production
          JWT_EXPIRES_IN=1h
          EOF

      - name: Initialize TimescaleDB extensions
        working-directory: .
        run: |
          PGPASSWORD=analytics_password psql \
            -h localhost \
            -U analytics_user \
            -d analytics_test \
            -c "CREATE EXTENSION IF NOT EXISTS timescaledb;" \
            -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"

      - name: Run database migrations
        run: npm run db:migrate
        env:
          NODE_ENV: test
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: analytics_user
          DATABASE_PASSWORD: analytics_password
          DATABASE_NAME: analytics_test

      - name: Run tests with coverage
        run: npm run test -- --coverage --forceExit
        env:
          NODE_ENV: test
          LOG_LEVEL: error
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: analytics_user
          DATABASE_PASSWORD: analytics_password
          DATABASE_NAME: analytics_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_DB: 0
          JWT_SECRET: test-jwt-secret-not-for-production

      # Upload para Codecov — token em GitHub Secrets (Settings → Secrets → Actions).
      # Adiciona CODECOV_TOKEN com o mesmo valor do teu .env local.
      # fail_ci_if_error: false evita bloquear o CI se o upload falhar.
      - name: Upload coverage report
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: backend
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Build TypeScript
        run: npm run build

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.dev
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
