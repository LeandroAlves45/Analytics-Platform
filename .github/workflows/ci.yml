# .github/workflows/ci.yml
#
# Pipeline de Integração Contínua (CI).
# Corre automaticamente em cada push e pull request para main e develop.
#
# Objectivo: garantir que nenhum código com erros entra na base de código.
#
# Jobs e ordem de execução:
#
#   lint ──────────────┐
#   test-unit ─────────┼── build (só corre se todos os jobs passarem)
#   test-integration ──┤   (integração só em push para main/develop)
#   sdk-lint ──────────┤
#   sdk-test ──────────┘
#
# Estratégia de testes:
#   - pull_request: apenas testes unitários (rápido, sem BD)
#   - push (merge): unitários + integração (suite completa com PostgreSQL)

name: CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

env:
  NODE_VERSION: '24'

# O código da aplicação vive em backend/ — todos os comandos npm correm aí.
defaults:
  run:
    working-directory: backend

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npm run type-check

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage:unit -- --forceExit

      - name: Upload unit coverage report
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: backend
          flags: unit
          fail_ci_if_error: false

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    # Suite completa só após merge — PRs correm apenas test-unit
    if: github.event_name == 'push'

    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_USER: analytics_user
          POSTGRES_PASSWORD: analytics_password
          POSTGRES_DB: analytics_test
        ports:
          - '5432:5432'
        options: >-
          --health-cmd "pg_isready -U analytics_user -d analytics_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Variáveis alinhadas com backend/src/infra/frameworks/config.ts
      - name: Create test .env file
        run: |
          cat > .env << EOF
          NODE_ENV=test
          PORT=3001
          LOG_LEVEL=error
          CORS_ORIGIN=http://localhost:3000
          DATABASE_HOST=localhost
          DATABASE_PORT=5432
          DATABASE_USER=analytics_user
          DATABASE_PASSWORD=analytics_password
          DATABASE_NAME=analytics_test
          REDIS_URL=redis://localhost:6379/0
          JWT_SECRET=test-jwt-secret-not-for-production
          JWT_EXPIRES_IN=1h
          EOF

      - name: Initialize TimescaleDB extensions
        working-directory: .
        run: |
          PGPASSWORD=analytics_password psql \
            -h localhost \
            -U analytics_user \
            -d analytics_test \
            -c "CREATE EXTENSION IF NOT EXISTS timescaledb;" \
            -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"

      - name: Run database migrations
        run: npm run db:migrate
        env:
          NODE_ENV: test
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: analytics_user
          DATABASE_PASSWORD: analytics_password
          DATABASE_NAME: analytics_test

      - name: Run integration tests with coverage
        run: npm run test:coverage:integration -- --forceExit
        env:
          NODE_ENV: test
          LOG_LEVEL: error
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: analytics_user
          DATABASE_PASSWORD: analytics_password
          DATABASE_NAME: analytics_test
          REDIS_URL: redis://localhost:6379/0
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_DB: 0
          JWT_SECRET: test-jwt-secret-not-for-production

      - name: Upload integration coverage report
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: backend
          flags: integration
          fail_ci_if_error: false

  sdk-lint:
    name: SDK Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: sdk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npm run type-check

      - name: Build TypeScript
        run: npm run build

  sdk-test:
    name: SDK Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: sdk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test-unit, test-integration, sdk-lint, sdk-test]
    if: >
      always() &&
      needs.lint.result == 'success' &&
      needs.test-unit.result == 'success' &&
      (needs.test-integration.result == 'success' || needs.test-integration.result == 'skipped') &&
      needs.sdk-lint.result == 'success' &&
      needs.sdk-test.result == 'success'
    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      # GHCR exige nomes de repositório em minúsculas (github.repository preserva casing do repo).
      - name: Set image name (lowercase)
        id: image
        run: |
          echo "name=${REGISTRY}/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile.dev
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
