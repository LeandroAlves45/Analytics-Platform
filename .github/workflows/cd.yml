# .github/workflows/cd.yml
#
# Pipeline de Entrega Contínua (CD).
# Gere os deploys para staging e produção.
#
# ESTADO ACTUAL:
# Os jobs de deploy estão estruturados mas com os steps reais comentados.
# Serão activados nos Sprints 7-8 quando tivermos infraestrutura configurada.
#
# Fluxo futuro:
#   push para develop → deploy automático para staging
#   push para main    → deploy para staging → aprovação manual → deploy para produção

name: CD

on:
  # Só corre em pushes directos (não em PRs)
  push:
    branches:
      - main
      - develop

# Garante que apenas um deploy corre de cada vez por environment.
# Se um deploy estiver em curso e outro for triggered, o novo espera.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

# Jobs do workflow
jobs:
  # ---------------------------------------------------------------------------
  # JOB: deploy-staging
  # Corre quando há push para a branch develop.
  # Pré-requisito: CI passou (lint, tests, build).
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest

    # Só corre em pushes para a branch develop
    if: github.ref == 'refs/heads/develop'

    # Environment do GitHub: permite configurar secrets específicos
    # e exigir aprovação manual antes do deploy
    #environment:
    #  name: staging
    #  url: https://staging-analytics.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

