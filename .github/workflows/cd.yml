      #   run: |
      #     railway run --service analytics-staging npm run db:migrate
      #   env:
      #     RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      # TODO Sprint 7-8: activar health check
      # - name: Health check
      #   run: |
      #     for i in {1..30}; do
      #       if curl -f https://staging-analytics.example.com/health; then
      #         echo "Health check passed"
      #         exit 0
      #       fi
      #       sleep 10
      #     done
      #     exit 1

      # Placeholder para o Sprint 1: confirma que o job foi atingido
      - name: Staging deploy placeholder
        run: |
          echo "Staging deploy will be configured in Sprint 7-8"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"

  # ---------------------------------------------------------------------------
