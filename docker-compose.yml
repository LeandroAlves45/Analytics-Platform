# docker-compose.yml
# Define o ambiente de desenvolvimento local.
# Dois serviços: PostgreSQL com TimescaleDB e Redis.
#
# Pré-requisito: cp backend/.env.example backend/.env (DATABASE_PORT=5433 com Docker)
# Iniciar: docker compose --env-file backend/.env up -d
# Parar:   docker compose down

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL com extensão TimescaleDB
  # Usamos a imagem oficial da Timescale que já inclui o PostgreSQL 15
  # e a extensão TimescaleDB pré-instalada.
  # ---------------------------------------------------------------------------
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: analytics-saas-postgres

    # Imagem Postgres exige POSTGRES_*; mapeamos a partir de DATABASE_* (backend/.env)
    environment:
      - POSTGRES_USER=${DATABASE_USER:-analytics_user}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD:-analyticspass}
      - POSTGRES_DB=${DATABASE_NAME:-analytics_db}

    # Porta 5433 no host evita conflito com PostgreSQL local (Windows) em 5432.
    ports:
      - '5433:5432'

    # Volume persistente: os dados da base de dados não se perdem
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-timescaledb.sql:/docker-entrypoint-initdb.d/init-timescaledb.sql

    # Healthcheck: verifica se o PostgreSQL está a funcionar
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${DATABASE_USER:-analytics_user} -d ${DATABASE_NAME:-analytics_db}
      interval: 10s
      timeout: 5s
      retries: 5

    # Reinicia automaticamente se falhar
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis 7 (cache e queue system para BullMQ)
  # Usamos alpine para imagem mais leve.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: analytics-saas-redis

    # Porta 6380 no host evita conflito com Redis local (Windows) em 6379.
    ports:
      - '6380:6379'

    # Volume persistente: os dados do Redis não se perdem
    volumes:
      - redis_data:/data

    # Healthcheck: verifica se o Redis está a funcionar
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli ping | grep PONG
      interval: 10s
      timeout: 5s
      retries: 5

    # Reinicia automaticamente se falhar
    restart: unless-stopped

# ---------------------------------------------------------------------------
# Volumes nomeados: geridos pelo Docker, persistem entre paragens do container
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
